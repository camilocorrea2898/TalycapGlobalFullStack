<mat-card class="mat-elevation-z4">
  <mat-card-content>
    <div fxLayout="row" fxLayout.lt-md="column" fxLayoutGap="16px">
      <mat-form-field appearance="outline" fxFlex>
        <mat-label>Filtrar por título</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Escribe un título...">
      </mat-form-field>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

        <ng-container matColumnDef="title" fxHide.lt-md>
          <th mat-header-cell *matHeaderCellDef> Título </th>
          <td mat-cell *matCellDef="let movie"> {{movie.title}} </td>
        </ng-container>

        <ng-container matColumnDef="release_date">
          <th mat-header-cell *matHeaderCellDef> Fecha </th>
          <td mat-cell *matCellDef="let movie"> {{movie.release_date | date}} </td>
        </ng-container>

        <ng-container matColumnDef="vote_average">
          <th mat-header-cell *matHeaderCellDef> Rating </th>
          <td mat-cell *matCellDef="let movie"> {{movie.vote_average}} </td>
        </ng-container>

        <ng-container matColumnDef="poster">
          <th mat-header-cell *matHeaderCellDef> Póster </th>
          <td mat-cell *matCellDef="let movie">
            <img [src]="'https://image.tmdb.org/t/p/w200' + movie.poster_path"
                 alt="poster"
                 class="poster-img">
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
