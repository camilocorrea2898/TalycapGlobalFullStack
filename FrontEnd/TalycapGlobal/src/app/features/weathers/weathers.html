<mat-card class="mat-elevation-z4">
  <mat-card-content>
    <div fxLayout="row" fxLayout.lt-md="column" fxLayoutGap="16px">
    <mat-form-field appearance="outline" fxFlex>
        <mat-label>Selecciona una ciudad</mat-label>
        <mat-select (selectionChange)="onCitySelected($event.value)">
        <mat-option *ngFor="let city of colombianCities" [value]="city">
            {{ city.name }}
        </mat-option>
        </mat-select>
    </mat-form-field>
    </div>


    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">

        <!-- Ciudad -->
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef> Ciudad </th>
          <td mat-cell *matCellDef="let w"> {{w.city}} </td>
        </ng-container>

        <!-- Temperatura -->
        <ng-container matColumnDef="temp">
          <th mat-header-cell *matHeaderCellDef> Temp (°C) </th>
          <td mat-cell *matCellDef="let w"> {{w.temp}} </td>
        </ng-container>

        <!-- Humedad -->
        <ng-container matColumnDef="humidity">
          <th mat-header-cell *matHeaderCellDef> Humedad (%) </th>
          <td mat-cell *matCellDef="let w"> {{w.humidity}} </td>
        </ng-container>

        <!-- Descripción -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Clima </th>
          <td mat-cell *matCellDef="let w"> {{w.description}} </td>
        </ng-container>

        <!-- Icono -->
        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef> Icono </th>
          <td mat-cell *matCellDef="let w">
            <img [src]="'https://openweathermap.org/img/wn/' + w.icon + '@2x.png'"
                 alt="icon"
                 class="weather-icon">
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
